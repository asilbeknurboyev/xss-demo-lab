<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Stored XSS - Lab</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #00ff00; padding: 40px; }
        .box { background-color: #262626; padding: 25px; border-radius: 10px; border: 1px solid #00ff00; max-width: 800px; margin: auto; }
        textarea { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; width: 95%; margin-bottom: 10px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .comment-box { background: #111; border: 1px solid #444; padding: 15px; margin-top: 15px; border-radius: 5px; }
        .back-btn { display: block; margin-top: 20px; color: #fff; text-decoration: none; font-size: 0.9em; }
        small { color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Stored XSS Lab</h1>
        <p>Baza ichiga zararli kod joylashtiring:</p>

        <form method="POST">
            {% csrf_token %}
            <textarea name="content" rows="4" placeholder="Izoh qoldiring..."></textarea>
            <button type="submit">Bazaga saqlash</button>
        </form>

        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        <h2>Barcha izohlar:</h2>

        {% for comment in comments %}
            <div class="comment-box">
                <p>{{ comment.text }}</p>
                <small>Saqlangan vaqt: {{ comment.created_at }}</small>
            </div>
        {% endfor %}

        <a href="{% url 'index' %}" class="back-btn">← Orqaga (Dashboard)</a>
    </div>
</body>
</html>
