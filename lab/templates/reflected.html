<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Reflected XSS - Lab</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #00ff00; padding: 40px; }
        .box { background-color: #262626; padding: 25px; border-radius: 10px; border: 1px solid #00ff00; max-width: 800px; margin: auto; }
        input[type="text"] { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; width: 70%; margin-bottom: 10px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .back-btn { display: block; margin-top: 20px; color: #fff; text-decoration: none; font-size: 0.9em; }
        .result { margin-top: 20px; padding: 15px; background: #333; border-left: 5px solid #00ff00; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Reflected XSS Lab</h1>
        <p>Qidiruv tizimidagi zaiflikni sinab ko'ring:</p>
        
        <form method="GET">
            <input type="text" name="q" placeholder="Zararli skript kiriting...">
            <button type="submit">Hujum qilish</button>
        </form>

        {% if query %}
            <div class="result">
                <h3>Natija:</h3>
                <p>Siz qidirdingiz: {{ query|safe }}</p> 
                </div>
        {% endif %}

        <a href="{% url 'index' %}" class="back-btn">← Orqaga (Dashboard)</a>
    </div>
</body>
</html>
