<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>XSS Laboratoriyasi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .container { background-color: #262626; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,0,0.2); max-width: 600px; margin: auto; }
        h1 { color: #fff; }
        .btn { display: inline-block; background: #00ff00; color: #000; padding: 15px 25px; margin: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00cc00; transform: scale(1.05); }
        p { color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>XSS Demo Lab</h1>
        <p>Kiberxavfsizlikni o'rganish uchun amaliy laboratoriya</p>
        <hr style="border: 0.5px solid #444;">
        <a href="{% url 'reflected_xss' %}" class="btn">Reflected XSS</a>
        <a href="{% url 'stored_xss' %}" class="btn">Stored XSS</a>
        <p style="font-size: 0.8em; margin-top: 20px;">Faqat o'quv maqsadlarida foydalanilsin!</p>
    </div>
</body>
</html>
